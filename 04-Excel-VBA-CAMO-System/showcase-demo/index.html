<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CAMO — Sledování letové způsobilosti</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1e3a5f;--primary-light:#2563eb;--bg:#f0f4f8;--card:#fff;--text:#1e293b;--muted:#64748b;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--border:#e2e8f0;--orange:#ea580c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#1e40af 100%);color:#fff;padding:0}
.header-inner{max-width:1280px;margin:0 auto;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:.6rem}
header h1 .icon{font-size:1.5rem}
.badge{background:rgba(255,255,255,.12);padding:.3rem .7rem;border-radius:16px;font-size:.7rem;letter-spacing:.5px}
.tabs{display:flex;background:#0f172a;padding:0 2rem;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.7rem 1rem;color:rgba(255,255,255,.6);font-size:.8rem;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:.4rem}
.tab:hover{color:#fff;background:rgba(255,255,255,.05)}
.tab.active{color:#fff;border-bottom-color:var(--orange);font-weight:600}
.phase-badge{background:#fef3c7;color:#92400e;padding:.1rem .4rem;border-radius:3px;font-size:.6rem;font-weight:700;text-transform:uppercase}
.mvp-badge{background:#dbeafe;color:#1d4ed8;padding:.1rem .4rem;border-radius:3px;font-size:.6rem;font-weight:700;text-transform:uppercase}
.container{max-width:1280px;margin:0 auto;padding:1.5rem 2rem}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--card);border-radius:10px;padding:1.2rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem}
.stat .value{font-size:1.6rem;font-weight:700}
.stat .sub{font-size:.75rem;color:var(--muted);margin-top:.2rem}
.stat.alert{border-left:4px solid var(--danger)}
.stat.alert .value{color:var(--danger)}
.stat.ok{border-left:4px solid var(--success)}
.stat.ok .value{color:var(--success)}
.stat.info{border-left:4px solid var(--primary-light)}
.stat.info .value{color:var(--primary-light)}

/* Fleet */
.section-title{font-size:1.1rem;font-weight:700;margin:1.5rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
.fleet{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1rem;margin-bottom:1.5rem}
.aircraft-card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .2s;cursor:pointer}
.aircraft-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ac-header{background:var(--primary);color:#fff;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center}
.ac-header h3{font-size:1rem}
.ac-type{font-size:.75rem;opacity:.8}
.ac-body{padding:1rem}
.ac-row{display:flex;justify-content:space-between;padding:.3rem 0;font-size:.85rem;border-bottom:1px solid var(--border)}
.ac-row:last-child{border:none}
.ac-row .lbl{color:var(--muted)}
.ac-status{display:inline-block;padding:.15rem .5rem;border-radius:6px;font-size:.7rem;font-weight:700}
.status-serviceable{background:#dcfce7;color:#166534}
.status-attention{background:#fef3c7;color:#92400e}
.status-danger{background:#fef2f2;color:#991b1b}

/* Quick Actions */
.quick-actions{display:flex;gap:.8rem;flex-wrap:wrap;margin:1rem 0 1.5rem}

/* Tables */
.data-panel{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;margin-bottom:1.5rem}
.data-header{padding:1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.5rem}
.data-header h3{font-size:1rem;display:flex;align-items:center;gap:.5rem}
.filters{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.3rem .8rem;border-radius:6px;border:1px solid var(--border);background:var(--card);font-size:.75rem;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead{background:var(--bg)}
th{padding:.6rem .8rem;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);white-space:nowrap}
td{padding:.6rem .8rem;border-bottom:1px solid var(--border)}
.urgency{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:.4rem}
.u-green{background:var(--success)}
.u-yellow{background:var(--warn)}
.u-red{background:var(--danger)}
.remaining{font-weight:600;font-size:.85rem}
.r-green{color:var(--success)}
.r-yellow{color:#b45309}
.r-red{color:var(--danger)}
tr.row-red{background:#fef2f2}
tr.row-yellow{background:#fffbeb}
.computed-col{background:#f0f9ff;font-weight:600;color:var(--primary)}
.compliance-compliant{color:#166534;font-weight:600}
.compliance-open{color:var(--danger);font-weight:600}
.compliance-na{color:var(--muted);font-style:italic}

/* Buttons */
.btn{padding:.5rem 1rem;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary{background:var(--primary-light);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-sm{padding:.3rem .6rem;font-size:.75rem;border-radius:6px}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.btn-success:hover{background:var(--success);color:#fff}
.btn-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.btn-warn:hover{background:var(--warn);color:#fff}
.action-btns{display:flex;gap:.3rem}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
.form-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.6rem .8rem;border:2px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;transition:border .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-light)}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:.8rem;margin-top:1rem;align-items:center}
.form-error{border-color:var(--danger)!important}
.fh-hint{font-size:.7rem;color:var(--muted);margin-top:.2rem;font-weight:400}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal-card{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:1.1rem}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:.2rem .5rem;border-radius:6px}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.8rem;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:4rem;right:1rem;background:#1e293b;color:#fff;padding:.8rem 1.2rem;border-radius:10px;font-size:.85rem;transform:translateY(100px);opacity:0;transition:all .3s;z-index:600;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:.5rem;max-width:400px}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{border-left:4px solid var(--success)}
.toast-error{border-left:4px solid var(--danger)}

/* Reports */
.report-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.report-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:1.2rem;cursor:pointer;transition:all .2s;text-align:center}
.report-card:hover{border-color:var(--primary-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.report-card.selected{border-color:var(--primary-light);background:#eff6ff}
.report-card .rc-icon{font-size:2rem;margin-bottom:.5rem}
.report-card h4{font-size:.95rem;margin-bottom:.3rem}
.report-card p{font-size:.75rem;color:var(--muted)}
.report-output{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.report-output-header{background:var(--primary);color:#fff;padding:1rem 1.5rem}
.report-output-body{padding:1.5rem}
.report-output-body table{margin:1rem 0}
.report-output-body .summary-stat{display:inline-block;background:var(--bg);padding:.5rem 1rem;border-radius:8px;margin:.3rem;font-size:.85rem}

/* Aircraft Profile */
.profile-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--primary-light);font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:1rem;padding:.3rem 0;border:none;background:none}
.profile-back:hover{text-decoration:underline}
.profile-hero{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:1.5rem}
.profile-hero-header{padding:1.5rem 2rem;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem}
.profile-hero-header h2{font-size:1.5rem;margin-bottom:.2rem}
.profile-hero-header .ph-sub{opacity:.8;font-size:.9rem}
.profile-hero-body{padding:1.5rem 2rem}
.profile-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem}
.profile-stat{text-align:center;padding:.8rem;background:var(--bg);border-radius:10px}
.profile-stat .ps-val{font-size:1.3rem;font-weight:700}
.profile-stat .ps-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:.2rem}
.profile-section{margin-bottom:1.5rem}
.profile-section-title{font-size:1rem;font-weight:700;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem;padding-bottom:.4rem;border-bottom:2px solid var(--orange)}
.clickable-reg{color:var(--primary-light);cursor:pointer;text-decoration:none}
.clickable-reg:hover{text-decoration:underline}
.profile-actions{display:flex;gap:.5rem;flex-wrap:wrap}

/* Engine Cards */
.engine-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:1rem;margin-bottom:1.5rem}
.engine-card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.engine-card-header{background:linear-gradient(135deg,#334155,#1e293b);color:#fff;padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:center}
.engine-card-header h4{font-size:.95rem}
.engine-card-header .ec-sub{font-size:.7rem;opacity:.8}
.engine-card-body{padding:1rem 1.2rem}
.engine-card-body .ec-section{margin-bottom:.8rem}
.engine-card-body .ec-section-title{font-size:.8rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem;padding-bottom:.2rem;border-bottom:1px solid var(--border)}
.ec-row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.82rem;border-bottom:1px dotted var(--border)}
.ec-row:last-child{border:none}
.ec-row .lbl{color:var(--muted)}
.ec-row .val{font-weight:600}

/* System Cards */
.system-card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:1rem}
.system-card-header{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;padding:.8rem 1.2rem}
.system-card-header h4{font-size:.9rem}
.system-card-body{padding:1rem 1.2rem}

/* Pilot Cards */
.pilot-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.pilot-card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .2s}
.pilot-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.pilot-card-header{background:linear-gradient(135deg,#0369a1,#0284c7);color:#fff;padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:center}
.pilot-card-header h4{font-size:.95rem}
.pilot-card-header .pc-license{font-size:.7rem;opacity:.9;background:rgba(255,255,255,.2);padding:.2rem .5rem;border-radius:4px}
.pilot-card-body{padding:1rem 1.2rem}
.pilot-card-body .pc-row{display:flex;justify-content:space-between;padding:.3rem 0;font-size:.82rem;border-bottom:1px solid var(--border)}
.pilot-card-body .pc-row:last-child{border:none}
.pilot-card-body .pc-row .lbl{color:var(--muted)}
.medical-ok{color:var(--success);font-weight:600}
.medical-warn{color:#b45309;font-weight:600}
.medical-expired{color:var(--danger);font-weight:600}

/* Data Source Badges */
.ds-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .5rem;border-radius:4px;font-size:.68rem;font-weight:600;white-space:nowrap}
.ds-easa{background:#dbeafe;color:#1d4ed8}
.ds-faa{background:#fef3c7;color:#92400e}
.ds-oem{background:#f3e8ff;color:#7c3aed}
.ds-manual{background:#f1f5f9;color:#475569}
.ds-aggregator{background:#dcfce7;color:#166534}
.feed-badge{display:inline-flex;align-items:center;gap:.2rem;padding:.1rem .4rem;border-radius:3px;font-size:.65rem;font-weight:600;background:#f8fafc;color:var(--muted);border:1px solid var(--border)}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.3rem}
.conn-green{background:#10b981}
.conn-yellow{background:#f59e0b}
.conn-red{background:#ef4444}
.conn-gray{background:#94a3b8}
.periodic-badge{display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600;background:#ede9fe;color:#7c3aed}
.onetime-badge{display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600;background:#f1f5f9;color:#64748b}

/* Misc */
.demo-badge{position:fixed;bottom:1rem;right:1rem;background:var(--primary);color:#fff;padding:.4rem .8rem;border-radius:6px;font-size:.7rem;font-weight:600;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
footer{text-align:center;padding:1.5rem;color:var(--muted);font-size:.75rem}
.ac-colors{display:flex;gap:2px}
.ac-colors span{width:8px;height:8px;border-radius:50%}
.sub-tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.sub-tab{padding:.4rem .8rem;border-radius:6px;border:1px solid var(--border);background:var(--card);font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:500}
.sub-tab:hover,.sub-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.conn-panel{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:1.2rem;margin-bottom:1.5rem}
.conn-panel h4{font-size:.9rem;margin-bottom:.8rem;color:var(--primary)}
.conn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:.6rem}
.conn-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .7rem;background:var(--bg);border-radius:8px;font-size:.78rem}
.conn-item .conn-name{flex:1;font-weight:500}
.conn-item .conn-status{font-size:.7rem;color:var(--muted)}

@media(max-width:768px){
.container{padding:1rem}
.fleet{grid-template-columns:1fr}
.engine-cards{grid-template-columns:1fr}
.pilot-cards{grid-template-columns:1fr}
table{font-size:.75rem}
th,td{padding:.4rem}
.form-grid{grid-template-columns:1fr}
.stats{grid-template-columns:repeat(2,1fr)}
.report-cards{grid-template-columns:1fr 1fr}
}
</style>
</head>

// ============================================================
// FH CONVERSION HELPERS (sexagesimal <-> decimal)
// ============================================================
function decimalToHHMM(decimal) {
  if (decimal === null || decimal === undefined || isNaN(decimal)) return '0:00';
  const hours = Math.floor(decimal);
  const minutes = Math.round((decimal - hours) * 60);
  return hours + ':' + String(minutes).padStart(2, '0');
}

function hhmmToDecimal(hhmm) {
  if (!hhmm || typeof hhmm !== 'string') return 0;
  if (hhmm.indexOf(':') === -1) return parseFloat(hhmm) || 0;
  const parts = hhmm.split(':');
  return parseInt(parts[0] || 0) + parseInt(parts[1] || 0) / 60;
}

function formatFH(decimal) {
  if (decimal === null || decimal === undefined) return '—';
  return decimal.toLocaleString('cs', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' FH (' + decimalToHHMM(decimal) + ')';
}

function formatFHShort(decimal) {
  if (decimal === null || decimal === undefined) return '—';
  return decimal.toLocaleString('cs', {minimumFractionDigits:1, maximumFractionDigits:1});
}

// ============================================================
// COMPUTE AIRCRAFT TOTALS FROM LOGBOOK
// ============================================================
function recomputeAircraftTotals() {
  state.aircraft.forEach(ac => {
    const flights = state.logbook.filter(l => l.reg === ac.id);
    ac.totalFH = round1(flights.reduce((s, f) => s + f.fh, 0));
    ac.totalFC = flights.reduce((s, f) => s + f.fc, 0);
    ac.totalES = flights.reduce((s, f) => s + (f.es || 0), 0);
    ac.totalRTE = round1(flights.reduce((s, f) => s + (f.rte || 0), 0));
  });
  // Recompute engine card totals to match aircraft
  state.aircraft.forEach(ac => {
    const ec = state.engineCards[ac.id];
    if (ec) {
      ec.forEach(e => { e.totalHours = ac.totalFH; e.totalStarts = ac.totalES; });
    }
  });
}

// ============================================================
// COMPUTE PILOT TOTALS FROM LOGBOOK
// ============================================================
function recomputePilotTotals() {
  state.pilots.forEach(p => {
    const flights = state.logbook.filter(l => l.pilot === p.name);
    p.totalFH = round1(flights.reduce((s, f) => s + f.fh, 0));
    p.totalFC = flights.reduce((s, f) => s + f.fc, 0);
    p.flights = flights.length;
  });
}

// ============================================================
// HELPERS
// ============================================================
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.getDate() + '.' + (d.getMonth()+1) + '.' + d.getFullYear();
}

function toISODate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function addMonths(isoDate, months) {
  const d = new Date(isoDate);
  d.setMonth(d.getMonth() + months);
  return d;
}

function round1(n) { return Math.round(n * 10) / 10; }

function getAircraft(reg) { return state.aircraft.find(a => a.id === reg); }

function getPilot(name) { return state.pilots.find(p => p.name === name); }

function getMedicalStatus(expiry) {
  const d = new Date(expiry);
  const now = new Date();
  const days = Math.floor((d - now) / (1000*60*60*24));
  if (days < 0) return { cls:'medical-expired', text:'EXPIRED' };
  if (days < 90) return { cls:'medical-warn', text:formatDate(expiry) + ' (' + days + 'd)' };
  return { cls:'medical-ok', text:formatDate(expiry) };
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type||'success') + ' show';
  setTimeout(() => t.className = 'toast', 3000);
}

function getDataSourceBadge(src) {
  const map = {
    'EASA API': 'ds-easa', 'FAA DRS': 'ds-faa', 'OEM Portal': 'ds-oem',
    'Manual': 'ds-manual', 'Aggregator': 'ds-aggregator'
  };
  return '<span class="ds-badge ' + (map[src]||'ds-manual') + '">' + src + '</span>';
}

function getConnDot(status) {
  return '<span class="conn-dot conn-' + status + '"></span>';
}

// ============================================================
// CALCULATION ENGINE
// ============================================================
function calcTaskDueValues(task) {
  if (task.intervalType === 'FH' || task.intervalType === 'Combined') {
    task.dueFH = task.lastFH !== null ? round1(task.lastFH + task.intervalValue) : null;
  } else { task.dueFH = null; }
  if (task.intervalType === 'FC') {
    task.dueFC = task.lastFC !== null ? task.lastFC + task.intervalValue : null;
  } else { task.dueFC = null; }
  if (task.intervalType === 'Calendar' || task.intervalType === 'Combined') {
    task.dueDate = task.lastDate ? toISODate(addMonths(task.lastDate, task.unit === 'Months' ? task.intervalValue : 0)) : null;
    if (task.unit === 'Days' && task.lastDate) {
      const d = new Date(task.lastDate);
      d.setDate(d.getDate() + task.intervalValue);
      task.dueDate = toISODate(d);
    }
  } else { task.dueDate = null; }
}

function calcRemainingFH(task) {
  if (task.dueFH === null) return null;
  const ac = getAircraft(task.reg);
  if (!ac) return null;
  return round1(task.dueFH - ac.totalFH);
}

function calcRemainingFC(task) {
  if (task.dueFC === null) return null;
  const ac = getAircraft(task.reg);
  if (!ac) return null;
  return task.dueFC - ac.totalFC;
}

function calcRemainingDays(task) {
  if (!task.dueDate) return null;
  const due = new Date(task.dueDate);
  const today = new Date();
  return Math.floor((due - today) / (1000*60*60*24));
}

function getStatusColor(remFH, remFC, remDays) {
  let worst = 3;
  if (remFH !== null) {
    if (remFH < 50) worst = Math.min(worst, 1);
    else if (remFH < 100) worst = Math.min(worst, 2);
  }
  if (remFC !== null) {
    if (remFC < 50) worst = Math.min(worst, 1);
    else if (remFC < 100) worst = Math.min(worst, 2);
  }
  if (remDays !== null) {
    if (remDays < 30) worst = Math.min(worst, 1);
    else if (remDays < 90) worst = Math.min(worst, 2);
  }
  if (worst <= 1) return { color:'red', status:'Overdue', priority:1 };
  if (worst <= 2) return { color:'yellow', status:'Due Soon', priority:2 };
  return { color:'green', status:'OK', priority:3 };
}

function refreshDueList() {
  state.taskCards.forEach(calcTaskDueValues);
  state.dueList = state.taskCards.map(t => {
    const remFH = calcRemainingFH(t);
    const remFC = calcRemainingFC(t);
    const remDays = calcRemainingDays(t);
    const s = getStatusColor(remFH, remFC, remDays);
    return { reg:t.reg, taskId:t.taskId, description:t.description,
             remainingFH:remFH, remainingFC:remFC, remainingDays:remDays,
             status:s.status, priority:s.priority, color:s.color,
             intervalType:t.intervalType, periodic:t.periodic };
  }).sort((a,b) => a.priority - b.priority);
}

function refreshComponents() {
  state.components.forEach(c => {
    const ac = getAircraft(c.reg);
    if (!ac) return;
    c.remainingFH = (c.limitFH && c.installFH !== null) ? round1((c.installFH + c.limitFH) - ac.totalFH) : null;
    if (c.limitCalendarMonths) {
      const limitDate = addMonths(c.installDate, c.limitCalendarMonths);
      c.remainingDays = Math.floor((limitDate - new Date()) / (1000*60*60*24));
    } else { c.remainingDays = null; }
  });
}

// ============================================================
// CRUD OPERATIONS
// ============================================================
function recordFlight(date, reg, fh, fc, es, rte, pilotName, note) {
  const ac = getAircraft(reg);
  if (!ac) return;
  state.logbook.unshift({ date, reg, fh, fc, es: es||0, rte: rte||0, pilot: pilotName, note, totalFHAfter: round1(ac.totalFH + fh) });
  recomputeAircraftTotals();
  recomputePilotTotals();
  refreshDueList();
  refreshComponents();
  renderAll();
  showToast('Let zaznamenan: ' + reg + ' +' + formatFHShort(fh) + ' FH, +' + fc + ' FC, ES:' + (es||0));
}

function addOrUpdateAircraft(data, isEdit) {
  if (isEdit) {
    const ac = getAircraft(data.id);
    // Preserve computed totals
    data.totalFH = ac.totalFH;
    data.totalFC = ac.totalFC;
    data.totalES = ac.totalES;
    data.totalRTE = ac.totalRTE;
    Object.assign(ac, data);
  } else {
    data.totalFH = 0; data.totalFC = 0; data.totalES = 0; data.totalRTE = 0;
    state.aircraft.push(data);
    // Create empty engine cards for new aircraft
    if (!state.engineCards[data.id]) {
      state.engineCards[data.id] = (data.engines || []).map(e => ({
        engineType: e.type, engineSN: e.sn, position: e.position, totalHours: 0, totalStarts: 0,
        oil:{type:'N/A',lastChangeFH:0,changeInterval:50},
        oilFilter:{pn:'N/A',lastChangeFH:0,changeInterval:50},
        sparkPlugs:{type:'N/A',count:0,lastChangeFH:0,changeInterval:200},
        fuelHoses:{lastInspectionFH:0,inspectionInterval:100},
        airFilter:{pn:'N/A',lastChangeFH:0,changeInterval:100}
      }));
    }
  }
  refreshDueList();
  refreshComponents();
  renderAll();
  showToast(isEdit ? 'Letadlo aktualizovano: ' + data.id : 'Letadlo pridano: ' + data.id);
}

function deleteAircraft(id) {
  if (!confirm('Opravdu smazat ' + id + '?')) return;
  state.aircraft = state.aircraft.filter(a => a.id !== id);
  state.taskCards = state.taskCards.filter(t => t.reg !== id);
  state.logbook = state.logbook.filter(l => l.reg !== id);
  state.components = state.components.filter(c => c.reg !== id);
  state.adsbTracking = state.adsbTracking.filter(a => !a.applicability.includes(id));
  delete state.engineCards[id];
  delete state.hydraulicSystems[id];
  recomputeAircraftTotals();
  recomputePilotTotals();
  refreshDueList();
  refreshComponents();
  renderAll();
  showToast('Letadlo smazano: ' + id);
}

function addOrUpdateTask(data, isEdit) {
  if (isEdit) {
    const idx = state.taskCards.findIndex(t => t.taskId === data.taskId);
    if (idx >= 0) state.taskCards[idx] = data;
  } else {
    data.taskId = 'TC-' + String(state.nextTaskId++).padStart(3,'0');
    state.taskCards.push(data);
  }
  refreshDueList();
  renderAll();
  showToast(isEdit ? 'Task aktualizovan: ' + data.taskId : 'Task pridan: ' + data.taskId);
}

function completeTask(taskId) {
  const task = state.taskCards.find(t => t.taskId === taskId);
  if (!task) return;
  const ac = getAircraft(task.reg);
  if (!ac) return;
  const today = toISODate(new Date());
  task.lastFH = ac.totalFH;
  task.lastDate = today;
  if (task.periodic) {
    // Periodic: recalc due values (auto-schedules next occurrence)
    calcTaskDueValues(task);
    showToast('Periodicky task splnen a preplanovany: ' + taskId);
  } else {
    showToast('Task splnen: ' + taskId);
  }
  refreshDueList();
  renderAll();
}

function deleteTask(taskId) {
  if (!confirm('Smazat task ' + taskId + '?')) return;
  state.taskCards = state.taskCards.filter(t => t.taskId !== taskId);
  refreshDueList();
  renderAll();
  showToast('Task smazan: ' + taskId);
}

function toggleADSBCompliance(idx) {
  const item = state.adsbTracking[idx];
  if (item.complianceStatus === 'Open') {
    item.complianceStatus = 'Compliant';
    item.completionDate = toISODate(new Date());
  } else if (item.complianceStatus === 'Compliant') {
    item.complianceStatus = 'Open';
    item.completionDate = '';
  }
  renderADSB();
  showToast('AD/SB status zmenen: ' + item.number);
}

// ============================================================
// TAB SWITCHING
// ============================================================
let currentView = 'dashboard';
document.getElementById('tab-bar').addEventListener('click', function(e) {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const view = tab.dataset.view;
  if (!view) return;
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
  document.getElementById('view-' + view).style.display = 'block';
});

function showView(viewName) {
  currentView = viewName;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === viewName);
  });
  document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
  document.getElementById('view-' + viewName).style.display = 'block';
}

let currentModal = null;
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  currentModal = title;
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
  currentModal = null;
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && currentModal) closeModal();
});

// ============================================================
// FH DUAL INPUT HANDLER
// ============================================================
function setupFHDualInput(decimalId, hhmmId) {
  setTimeout(() => {
    const decEl = document.getElementById(decimalId);
    const hhmmEl = document.getElementById(hhmmId);
    if (!decEl || !hhmmEl) return;
    decEl.addEventListener('input', function() {
      const v = parseFloat(this.value);
      if (!isNaN(v) && v >= 0) hhmmEl.value = decimalToHHMM(v);
    });
    hhmmEl.addEventListener('input', function() {
      const v = hhmmToDecimal(this.value);
      if (v >= 0) decEl.value = round1(v);
    });
  }, 50);
}

  const reg = document.getElementById('m-flight-reg').value;
  const date = document.getElementById('m-flight-date').value;

  const fc = parseInt(document.getElementById('m-flight-fc').value);

  const pilot = document.getElementById('m-flight-pilot').value;
  const note = document.getElementById('m-flight-note').value;
  if (!reg || !date || isNaN(fh) || fh <= 0 || isNaN(fc) || fc <= 0 || !pilot) {

    showToast('Pilot neni registrovan v systemu', 'error');
    return;
  }
  closeModal();
  recordFlight(date, reg, fh, fc, es, rte, pilot, note);
}

  const name = document.getElementById('m-pilot-name').value.trim();

  const ratings = document.getElementById('m-pilot-ratings').value.trim();

    state.pilots.push({ id: 'P' + (state.pilots.length+1), name, license, licenseType, ratings, medicalExpiry, totalFH:0, totalFC:0, flights:0 });
  }
  recomputePilotTotals();
  closeModal();
  renderAll();
  showToast(isEdit ? 'Pilot aktualizovan' : 'Pilot pridan: ' + name);

function openReportModal(type) {
  let filterHtml = '';
  if (type === 'detail') {
    const opts = state.aircraft.map(a => '<option value="'+a.id+'">'+a.id+' — '+a.type+'</option>').join('');
    filterHtml = '<div class="form-group" style="margin-top:1rem"><label>Vyberte letadlo</label><select id="m-report-ac">'+opts+'</select></div>';
  }
  if (type === 'pilot') {
    const opts = state.pilots.map(p => '<option value="'+p.name+'">'+p.name+' ('+p.licenseType+')</option>').join('');
    filterHtml = '<div class="form-group" style="margin-top:1rem"><label>Vyberte pilota</label><select id="m-report-pilot">'+opts+'</select></div>';
  }
  const body = '<p style="color:var(--muted);margin-bottom:.5rem">Generovani reportu: <strong>' + getReportName(type) + '</strong></p>' + filterHtml;
  const footer = '<button class="btn btn-outline" onclick="closeModal()">Storno</button><button class="btn btn-primary" onclick="generateAndShowReport(\''+type+'\')">Generovat</button>';
  openModal('Generator reportu — frmReportGen', body, footer);
}

function getReportName(t) {
  return { fleet:'Fleet Summary', detail:'Aircraft Detail', overdue:'Overdue Items', compliance:'Compliance Status', pilot:'Pilot Report' }[t] || t;
}

function generateAndShowReport(type) {
  const acFilter = document.getElementById('m-report-ac') ? document.getElementById('m-report-ac').value : null;
  const pilotFilter = document.getElementById('m-report-pilot') ? document.getElementById('m-report-pilot').value : null;
  closeModal();
  let html = '';
  if (type === 'fleet') html = genFleetReport();
  else if (type === 'detail') html = genDetailReport(acFilter);
  else if (type === 'overdue') html = genOverdueReport();
  else if (type === 'compliance') html = genComplianceReport();
  else if (type === 'pilot') html = genPilotReport(pilotFilter);
  document.getElementById('report-output').innerHTML = html;
  document.getElementById('report-output').style.display = 'block';
  showToast('Report vygenerovan: ' + getReportName(type));
}

function genFleetReport() {
  const totalFH = round1(state.aircraft.reduce((s,a) => s+a.totalFH, 0));
  const totalFC = state.aircraft.reduce((s,a) => s+a.totalFC, 0);
  const totalES = state.aircraft.reduce((s,a) => s+a.totalES, 0);
  const redItems = state.dueList.filter(d => d.color==='red').length;
  const yellowItems = state.dueList.filter(d => d.color==='yellow').length;
  let rows = state.aircraft.map(a => {
    const acDue = state.dueList.filter(d => d.reg===a.id);
    const r = acDue.filter(d=>d.color==='red').length;
    const y = acDue.filter(d=>d.color==='yellow').length;
    return `<tr><td><strong>${a.id}</strong></td><td>${a.type}</td><td>${formatFH(a.totalFH)}</td><td>${a.totalFC.toLocaleString('cs')}</td><td>${a.totalES}</td><td>${formatFH(a.totalRTE)}</td><td>${a.status}</td><td class="${r?'r-red':y?'r-yellow':'r-green'}">${r} red, ${y} yellow</td></tr>`;
  }).join('');
  return `<div class="report-output"><div class="report-output-header"><h3>Fleet Summary Report</h3><small>Generovano: ${formatDate(toISODate(new Date()))}</small></div>
    <div class="report-output-body">

}

function genDetailReport(reg) {
  const ac = getAircraft(reg);
  if (!ac) return '<p>Letadlo nenalezeno.</p>';
  const tasks = state.dueList.filter(d => d.reg===reg);
  const comps = state.components.filter(c => c.reg===reg);
  const flights = state.logbook.filter(l => l.reg===reg).slice(0,5);
  let taskRows = tasks.map(t => `<tr class="row-${t.color}"><td>${t.taskId}</td><td>${t.description}</td><td class="r-${t.color}">${t.remainingFH!==null?t.remainingFH+' FH':''} ${t.remainingDays!==null?t.remainingDays+' dni':''}</td><td>${t.status}</td></tr>`).join('');
  let compRows = comps.map(c => `<tr><td>${c.description}</td><td>${c.pn}</td><td>${c.remainingFH!==null?c.remainingFH+' FH':'—'}</td><td>${c.remainingDays!==null?c.remainingDays+' dni':'—'}</td></tr>`).join('');
  let flightRows = flights.map(f => `<tr><td>${formatDate(f.date)}</td><td>${formatFH(f.fh)}</td><td>${f.fc}</td><td>${f.es||0}</td><td>${f.pilot}</td></tr>`).join('');
  return `<div class="report-output"><div class="report-output-header"><h3>Aircraft Detail: ${ac.id} — ${ac.type}</h3><small>S/N: ${ac.sn} | Total FH: ${formatFH(ac.totalFH)} | Total FC: ${ac.totalFC} | ES: ${ac.totalES}</small></div>
    <div class="report-output-body">
    <h4 style="margin:1rem 0 .5rem">Udrzba</h4><div class="table-scroll"><table><thead><tr><th>Task</th><th>Popis</th><th>Zbyva</th><th>Status</th></tr></thead><tbody>${taskRows||'<tr><td colspan="4">Zadne ukony</td></tr>'}</tbody></table></div>
    <h4 style="margin:1rem 0 .5rem">Komponenty</h4><div class="table-scroll"><table><thead><tr><th>Komponenta</th><th>P/N</th><th>Remaining FH</th><th>Remaining Days</th></tr></thead><tbody>${compRows||'<tr><td colspan="4">Zadne komponenty</td></tr>'}</tbody></table></div>
    <h4 style="margin:1rem 0 .5rem">Posledni lety</h4><div class="table-scroll"><table><thead><tr><th>Datum</th><th>FH</th><th>FC</th><th>ES</th><th>Pilot</th></tr></thead><tbody>${flightRows||'<tr><td colspan="5">Zadne lety</td></tr>'}</tbody></table></div></div></div>`;
}

function genOverdueReport() {
  const items = state.dueList.filter(d => d.color==='red' || d.color==='yellow');
  let rows = items.map(d => `<tr class="row-${d.color}"><td><span class="urgency u-${d.color}"></span></td><td><strong>${d.reg}</strong></td><td>${d.taskId}</td><td>${d.description}</td><td class="r-${d.color}">${d.remainingFH!==null?d.remainingFH+' FH':''} ${d.remainingDays!==null?d.remainingDays+' dni':''}</td><td>${d.status}</td></tr>`).join('');
  return `<div class="report-output"><div class="report-output-header" style="background:var(--danger)"><h3>Overdue Items Report</h3><small>${items.length} polozek vyzaduje pozornost</small></div>
    <div class="report-output-body"><div class="table-scroll"><table><thead><tr><th></th><th>Reg.</th><th>Task</th><th>Popis</th><th>Zbyva</th><th>Status</th></tr></thead><tbody>${rows||'<tr><td colspan="6">Zadne overdue polozky</td></tr>'}</tbody></table></div></div></div>`;

function genComplianceReport() {
  let rows = state.adsbTracking.map(a => {
    const cls = a.complianceStatus==='Compliant'?'compliance-compliant':a.complianceStatus==='Open'?'compliance-open':'compliance-na';
    return `<tr><td><strong>${a.number}</strong></td><td>${a.type}</td><td>${a.applicability}</td><td class="${cls}">${a.complianceStatus}</td><td>${formatDate(a.deadline)}</td><td>${formatDate(a.completionDate)}</td><td>${getDataSourceBadge(a.dataSource)}</td></tr>`;
  }).join('');
  const open = state.adsbTracking.filter(a => a.complianceStatus==='Open').length;
  const compliant = state.adsbTracking.filter(a => a.complianceStatus==='Compliant').length;
  return `<div class="report-output"><div class="report-output-header" style="background:#1e3a5f"><h3>Compliance Status Report</h3><small>Compliant: ${compliant} | Open: ${open} | Total: ${state.adsbTracking.length}</small></div>
    <div class="report-output-body"><div class="table-scroll"><table><thead><tr><th>Cislo</th><th>Typ</th><th>Applicability</th><th>Status</th><th>Deadline</th><th>Splneno</th><th>Zdroj</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
}

function genPilotReport(pilotName) {
  const p = getPilot(pilotName);
  if (!p) return '<p>Pilot nenalezen.</p>';
  const flights = state.logbook.filter(l => l.pilot === pilotName);
  const med = getMedicalStatus(p.medicalExpiry);
  const byAc = {};
  flights.forEach(f => { if (!byAc[f.reg]) byAc[f.reg] = {fh:0,fc:0,count:0}; byAc[f.reg].fh += f.fh; byAc[f.reg].fc += f.fc; byAc[f.reg].count++; });
  let acRows = Object.entries(byAc).map(([reg, d]) => `<tr><td><strong>${reg}</strong></td><td>${formatFH(round1(d.fh))}</td><td>${d.fc}</td><td>${d.count}</td></tr>`).join('');
  let flightRows = flights.slice(0,10).map(f => `<tr><td>${formatDate(f.date)}</td><td>${f.reg}</td><td>${formatFH(f.fh)}</td><td>${f.fc}</td><td>${f.note}</td></tr>`).join('');
  return `<div class="report-output"><div class="report-output-header" style="background:#0369a1"><h3>Pilot Report: ${p.name}</h3><small>${p.licenseType} — ${p.license} | Medical: ${med.text}</small></div>
    <div class="report-output-body">
    <div style="margin-bottom:1rem"><span class="summary-stat">Total FH: <strong>${formatFH(p.totalFH)}</strong></span><span class="summary-stat">Total FC: <strong>${p.totalFC}</strong></span><span class="summary-stat">Lety: <strong>${p.flights}</strong></span><span class="summary-stat">Kvalifikace: <strong>${p.ratings}</strong></span></div>
    <h4 style="margin:1rem 0 .5rem">FH dle letadla</h4><div class="table-scroll"><table><thead><tr><th>Letadlo</th><th>FH</th><th>FC</th><th>Lety</th></tr></thead><tbody>${acRows||'<tr><td colspan="4">Zadne lety</td></tr>'}</tbody></table></div>
    <h4 style="margin:1rem 0 .5rem">Posledni lety</h4><div class="table-scroll"><table><thead><tr><th>Datum</th><th>Letadlo</th><th>FH</th><th>FC</th><th>Poznamka</th></tr></thead><tbody>${flightRows||'<tr><td colspan="5">Zadne lety</td></tr>'}</tbody></table></div></div></div>`;
}

function renderDashboard() {
  const totalFH = round1(state.aircraft.reduce((s,a) => s+a.totalFH, 0));
  const totalES = state.aircraft.reduce((s,a) => s+a.totalES, 0);
  const dueItems = state.dueList.filter(d => d.color!=='green').length;
  const redItems = state.dueList.filter(d => d.color==='red').length;
  let nextMaint = '—';
  const fhDue = state.dueList.filter(d => d.remainingFH !== null && d.remainingFH > 0).sort((a,b) => a.remainingFH - b.remainingFH);
  const daysDue = state.dueList.filter(d => d.remainingDays !== null && d.remainingDays > 0).sort((a,b) => a.remainingDays - b.remainingDays);
  if (daysDue.length) nextMaint = daysDue[0].remainingDays + ' dni (' + daysDue[0].reg + ')';
  else if (fhDue.length) nextMaint = fhDue[0].remainingFH + ' FH (' + fhDue[0].reg + ')';

  const acColors = {};
  state.aircraft.forEach(a => acColors[a.id] = 'green');
  state.dueList.forEach(d => {
    if (d.color === 'red') acColors[d.reg] = 'red';
    else if (d.color === 'yellow' && acColors[d.reg] !== 'red') acColors[d.reg] = 'yellow';
  });
  const headerColors = { 'OK-ABC':'var(--primary)', 'OK-DEF':'#166534', 'OK-GHI':'#92400e' };
  const fleetHtml = state.aircraft.map(a => {
    const col = acColors[a.id];
    const statusCls = col==='red'?'status-danger':col==='yellow'?'status-attention':'status-serviceable';
    const statusTxt = col==='red'?'Overdue items':col==='yellow'?'Due items':'Serviceable';
    return `<div class="aircraft-card" onclick="openAircraftProfile('${a.id}')"><div class="ac-header" style="background:${headerColors[a.id]||'var(--primary)'}"><h3>${a.id}</h3><span class="ac-type">${a.type}</span></div>
      <div class="ac-body">
        <div class="ac-row"><span class="lbl">S/N</span><span>${a.sn}</span></div>
        <div class="ac-row"><span class="lbl">Total FH</span><span><strong>${formatFH(a.totalFH)}</strong></span></div>
        <div class="ac-row"><span class="lbl">Total FC</span><span><strong>${a.totalFC.toLocaleString('cs')}</strong></span></div>
        <div class="ac-row"><span class="lbl">ES / RTE</span><span>${a.totalES} / ${formatFH(a.totalRTE)}</span></div>
        <div class="ac-row"><span class="lbl">Status</span><span class="ac-status ${statusCls}">${statusTxt}</span></div>
      </div></div>`;
  }).join('');

  document.getElementById('view-dashboard').innerHTML = `
    <div class="stats">
      <div class="stat ok"><div class="label">Letadla v evidenci</div><div class="value">${state.aircraft.length}</div><div class="sub">Flotila</div></div>
      <div class="stat info"><div class="label">Celkem FH flotily</div><div class="value">${formatFHShort(totalFH)}</div><div class="sub">${decimalToHHMM(totalFH)}</div></div>
      <div class="stat info"><div class="label">Celkem ES</div><div class="value">${totalES}</div><div class="sub">Engine starts</div></div>
      <div class="stat ${redItems?'alert':''}"><div class="label">Polozky k pozornosti</div><div class="value">${dueItems}</div><div class="sub">${redItems} kritickych</div></div>
      <div class="stat"><div class="label">Pilotu</div><div class="value">${state.pilots.length}</div><div class="sub">Registrovanych</div></div>
      <div class="stat"><div class="label">Pristi udrzba</div><div class="value" style="font-size:1.1rem">${nextMaint}</div><div class="sub">Nejblizsi due item</div></div>
    </div>
    <div class="section-title">Quick Actions</div>
    <div class="quick-actions">
      <button class="btn btn-primary" onclick="openFlightModal()">+ Zaznam letu</button>
      <button class="btn btn-outline" onclick="openAircraftModal()">+ Nove letadlo</button>
      <button class="btn btn-outline" onclick="openTaskModal()">+ Novy task</button>
      <button class="btn btn-outline" onclick="openPilotModal()">+ Novy pilot</button>
      <button class="btn btn-outline" onclick="showView('reports')">Generovat report</button>
    </div>
    <div class="section-title">Flotila</div>
    <div class="fleet">${fleetHtml}</div>`;
}

let dueFilter = 'all';
function renderDueList() {
  const filtered = dueFilter === 'all' ? state.dueList : state.dueList.filter(d => d.color === dueFilter);

    const remStr = [];
    if (d.remainingFH !== null) remStr.push(d.remainingFH + ' FH');

    if (d.remainingDays !== null) remStr.push(d.remainingDays + ' dni');

function saveLogbookForm() {
  const reg = document.getElementById('log-reg').value;
  const date = document.getElementById('log-date').value;
  const fh = parseFloat(document.getElementById('log-fh').value);
  const fc = parseInt(document.getElementById('log-fc').value);
  const es = parseInt(document.getElementById('log-es').value) || 0;
  const rte = parseFloat(document.getElementById('log-rte').value) || 0;
  const pilot = document.getElementById('log-pilot').value;
  const note = document.getElementById('log-note').value;
  if (!reg || !date || isNaN(fh) || fh<=0 || isNaN(fc) || fc<=0 || !pilot) {
    showToast('Vyplnte vsechna povinna pole', 'error'); return;
  }
  if (!getPilot(pilot)) {
    showToast('Pilot neni registrovan', 'error'); return;
  }
  recordFlight(date, reg, fh, fc, es, rte, pilot, note);
}

function clearLogbookForm() {
  ['log-fh','log-fh-hhmm','log-fc','log-es','log-rte','log-rte-hhmm','log-note'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
}

function renderEngineCards() {
  let allCards = '';
  state.aircraft.forEach(ac => {
    const engines = state.engineCards[ac.id] || [];
    engines.forEach(eng => {
      const oilRemaining = round1((eng.oil.lastChangeFH + eng.oil.changeInterval) - ac.totalFH);
      const filterRemaining = round1((eng.oilFilter.lastChangeFH + eng.oilFilter.changeInterval) - ac.totalFH);
      const sparkRemaining = round1((eng.sparkPlugs.lastChangeFH + eng.sparkPlugs.changeInterval) - ac.totalFH);
      const hoseRemaining = round1((eng.fuelHoses.lastInspectionFH + eng.fuelHoses.inspectionInterval) - ac.totalFH);
      const airFilterRem = eng.airFilter ? round1((eng.airFilter.lastChangeFH + eng.airFilter.changeInterval) - ac.totalFH) : null;

      const oilColor = oilRemaining < 10 ? 'r-red' : oilRemaining < 20 ? 'r-yellow' : 'r-green';
      const filterColor = filterRemaining < 10 ? 'r-red' : filterRemaining < 20 ? 'r-yellow' : 'r-green';
      const sparkColor = sparkRemaining < 50 ? 'r-red' : sparkRemaining < 100 ? 'r-yellow' : 'r-green';
      const hoseColor = hoseRemaining < 20 ? 'r-red' : hoseRemaining < 50 ? 'r-yellow' : 'r-green';

      allCards += `<div class="engine-card">
        <div class="engine-card-header">
          <div><h4>${ac.id} — ${eng.engineType}</h4><div class="ec-sub">S/N: ${eng.engineSN} | Pozice: ${eng.position}</div></div>
          <div style="text-align:right"><div style="font-size:1.1rem;font-weight:700">${formatFHShort(ac.totalFH)}</div><div class="ec-sub">${ac.totalES} starts</div></div>
        </div>
        <div class="engine-card-body">
          <div class="ec-section">
            <div class="ec-section-title">Olej</div>
            <div class="ec-row"><span class="lbl">Typ</span><span class="val">${eng.oil.type}</span></div>
            <div class="ec-row"><span class="lbl">Posledni vymena</span><span>${formatFHShort(eng.oil.lastChangeFH)} FH</span></div>
            <div class="ec-row"><span class="lbl">Interval</span><span>${eng.oil.changeInterval} FH</span></div>
            <div class="ec-row"><span class="lbl">Zbyva</span><span class="val ${oilColor}">${oilRemaining} FH</span></div>
          </div>
          <div class="ec-section">
            <div class="ec-section-title">Olejovy filtr</div>
            <div class="ec-row"><span class="lbl">P/N</span><span class="val">${eng.oilFilter.pn}</span></div>
            <div class="ec-row"><span class="lbl">Posledni vymena</span><span>${formatFHShort(eng.oilFilter.lastChangeFH)} FH</span></div>
            <div class="ec-row"><span class="lbl">Zbyva</span><span class="val ${filterColor}">${filterRemaining} FH</span></div>
          </div>
          <div class="ec-section">
            <div class="ec-section-title">Zapalovaci svicky</div>
            <div class="ec-row"><span class="lbl">Typ</span><span class="val">${eng.sparkPlugs.type} (${eng.sparkPlugs.count} ks)</span></div>
            <div class="ec-row"><span class="lbl">Posledni vymena</span><span>${formatFHShort(eng.sparkPlugs.lastChangeFH)} FH</span></div>
            <div class="ec-row"><span class="lbl">Interval</span><span>${eng.sparkPlugs.changeInterval} FH</span></div>
            <div class="ec-row"><span class="lbl">Zbyva</span><span class="val ${sparkColor}">${sparkRemaining} FH</span></div>
          </div>
          <div class="ec-section">
            <div class="ec-section-title">Palivove hadice</div>
            <div class="ec-row"><span class="lbl">Posledni inspekce</span><span>${formatFHShort(eng.fuelHoses.lastInspectionFH)} FH</span></div>
            <div class="ec-row"><span class="lbl">Interval</span><span>${eng.fuelHoses.inspectionInterval} FH</span></div>
            <div class="ec-row"><span class="lbl">Zbyva</span><span class="val ${hoseColor}">${hoseRemaining} FH</span></div>
          </div>
          ${eng.airFilter ? `<div class="ec-section">
            <div class="ec-section-title">Vzduchovy filtr</div>
            <div class="ec-row"><span class="lbl">P/N</span><span class="val">${eng.airFilter.pn}</span></div>
            <div class="ec-row"><span class="lbl">Posledni vymena</span><span>${formatFHShort(eng.airFilter.lastChangeFH)} FH</span></div>
            <div class="ec-row"><span class="lbl">Zbyva</span><span class="val">${airFilterRem} FH</span></div>
          </div>` : ''}

      </div>`;
    });

  // Hydraulic systems
  let hydCards = '';

    const ac = getAircraft(reg);
    if (!ac) return;
    const fluidRem = round1((sys.fluid.lastChangeFH + sys.fluid.changeInterval) - ac.totalFH);
    const filterRem = round1((sys.filter.lastChangeFH + sys.filter.changeInterval) - ac.totalFH);
    const hoseRem = round1((sys.hoses.lastInspectionFH + sys.hoses.inspectionInterval) - ac.totalFH);

        </div>
        <div class="ec-section">
          <div class="ec-section-title">Tesneni</div>
          <div class="ec-row"><span class="lbl">Interval inspekce</span><span>${sys.seals.inspectionInterval} FH</span></div>
          <div class="ec-row"><span class="lbl">Zbyva</span><span class="val ${sealRem<50?'r-red':sealRem<100?'r-yellow':'r-green'}">${sealRem} FH</span></div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('view-engines').innerHTML = `
    <div class="section-title">Engine Cards <span class="phase-badge">Phase 2</span></div>
    <div class="engine-cards">${allCards}</div>
    ${hydCards ? '<div class="section-title">Hydraulic Systems</div>' + hydCards : ''}`;
}

let profileReg = null;
function openAircraftProfile(reg) {
  profileReg = reg;

function renderAircraftProfile(reg) {
  const ac = getAircraft(reg);
  if (!ac) return;

  const acTasks = state.taskCards.filter(t => t.reg === reg);
  const acDue = state.dueList.filter(d => d.reg === reg);
  const acComps = state.components.filter(c => c.reg === reg);
  const acADSB = state.adsbTracking.filter(a => a.applicability.includes(reg));
  const acFlights = state.logbook.filter(l => l.reg === reg);
  const acEngines = state.engineCards[reg] || [];
  const acHydraulic = state.hydraulicSystems[reg] || null;

  const redCount = acDue.filter(d => d.color === 'red').length;
  const yellowCount = acDue.filter(d => d.color === 'yellow').length;
  const openAD = acADSB.filter(a => a.complianceStatus === 'Open').length;

  // Unique pilots who flew this aircraft
  const pilotNames = [...new Set(acFlights.map(f => f.pilot))];

  const headerColors = { 'OK-ABC':'var(--primary)', 'OK-DEF':'#166534', 'OK-GHI':'#92400e' };
  const hdrColor = headerColors[reg] || 'var(--primary)';

  // Due List rows
  const dueRows = acDue.map(d => {
    const remStr = [];
    if (d.remainingFH !== null) remStr.push(d.remainingFH + ' FH');
    if (d.remainingDays !== null) remStr.push(d.remainingDays + ' dni');
    const periodicIcon = d.periodic ? ' <span class="periodic-badge" style="font-size:.6rem">&#8635;</span>' : '';
    return `<tr class="row-${d.color}"><td><span class="urgency u-${d.color}"></span></td>
      <td>${d.taskId}${periodicIcon}</td><td>${d.description}</td><td>${d.intervalType}</td>
      <td class="remaining r-${d.color}">${remStr.join(' / ')}</td><td>${d.status}</td></tr>`;
  }).join('');

  // Task rows
  const taskRows = acTasks.map(t => {
    const pBadge = t.periodic ? '<span class="periodic-badge" style="font-size:.6rem">&#8635;</span>' : '<span class="onetime-badge" style="font-size:.6rem">&#9679;</span>';
    return `<tr>
    <td><strong>${t.taskId}</strong></td><td>${t.description}</td><td>${pBadge}</td><td>${t.intervalType}</td>
    <td>${t.intervalValue} ${t.unit}</td><td>${t.lastFH !== null ? formatFHShort(t.lastFH) : '—'}</td>
    <td>${formatDate(t.lastDate)}</td>
    <td class="computed-col">${t.dueFH !== null ? formatFHShort(t.dueFH) : '—'}</td>
    <td class="computed-col">${formatDate(t.dueDate)}</td></tr>`;
  }).join('');

  // Components rows
  const compRows = acComps.map(c => {
    const s = getStatusColor(c.remainingFH, null, c.remainingDays);
    return `<tr class="row-${s.color}">
      <td>${c.description}</td><td>${c.pn}</td><td>${c.sn}</td>
      <td>${formatDate(c.installDate)}</td><td>${c.limitFH || '—'}</td>
      <td>${c.limitCalendarMonths ? c.limitCalendarMonths + ' mes.' : '—'}</td>
      <td class="remaining r-${s.color}">${c.remainingFH !== null ? c.remainingFH + ' FH' : '—'}</td>
      <td class="remaining r-${s.color}">${c.remainingDays !== null ? c.remainingDays + ' dni' : '—'}</td></tr>`;

  // AD/SB rows

      <td>${getDataSourceBadge(a.dataSource)}</td>
      <td>${formatDate(a.deadline)}</td><td>${formatDate(a.completionDate)}</td></tr>`;

      </div>
    </div>`;
  });

  // Hydraulic system for this aircraft
  let hydHtml = '';
  if (acHydraulic) {
    const flRem = round1((acHydraulic.fluid.lastChangeFH + acHydraulic.fluid.changeInterval) - ac.totalFH);
    const fiRem = round1((acHydraulic.filter.lastChangeFH + acHydraulic.filter.changeInterval) - ac.totalFH);
    hydHtml = `<div class="system-card">
      <div class="system-card-header"><h4>${acHydraulic.type}</h4></div>
      <div class="system-card-body">
        <div class="ec-row"><span class="lbl">Kapalina (${acHydraulic.fluid.type})</span><span class="val ${flRem<50?'r-red':'r-green'}">${flRem} FH zbyva</span></div>
        <div class="ec-row"><span class="lbl">Filtr (${acHydraulic.filter.pn})</span><span class="val ${fiRem<50?'r-red':'r-green'}">${fiRem} FH zbyva</span></div>
        <div class="ec-row"><span class="lbl">Hadice — inspekce</span><span class="val">${round1((acHydraulic.hoses.lastInspectionFH + acHydraulic.hoses.inspectionInterval) - ac.totalFH)} FH zbyva</span></div>
        <div class="ec-row"><span class="lbl">Tesneni — inspekce</span><span class="val">${round1((acHydraulic.seals.lastInspectionFH + acHydraulic.seals.inspectionInterval) - ac.totalFH)} FH zbyva</span></div>
      </div>
    </div>`;
  }

  // Propeller/Rotor info
  const propInfo = ac.propellers && ac.propellers[0] ? ac.propellers[0] : null;
  const propLabel = ac.category === 'piston-heli' ? 'Rotor' : 'Vrtule';

  document.getElementById('view-profile').innerHTML = `
    <button class="profile-back" onclick="showView('dashboard')">&larr; Zpet na Dashboard</button>

    <div class="profile-hero">
      <div class="profile-hero-header" style="background:${hdrColor}">
        <div>
          <h2>${ac.id}</h2>
          <div class="ph-sub">${ac.type} — S/N: ${ac.sn}</div>
        </div>
        <div class="profile-actions">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="openFlightModal()">+ Zaznam letu</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="openTaskModal()">+ Novy task</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="openAircraftModal('${ac.id}')">Editovat</button>
        </div>
      </div>
      <div class="profile-hero-body">
        <div class="profile-stats">
          <div class="profile-stat"><div class="ps-val">${formatFHShort(ac.totalFH)}</div><div class="ps-lbl">Total FH</div></div>
          <div class="profile-stat"><div class="ps-val">${decimalToHHMM(ac.totalFH)}</div><div class="ps-lbl">FH (HH:MM)</div></div>
          <div class="profile-stat"><div class="ps-val">${ac.totalFC.toLocaleString('cs')}</div><div class="ps-lbl">Total FC</div></div>
          <div class="profile-stat"><div class="ps-val">${ac.totalES}</div><div class="ps-lbl">Total ES</div></div>
          <div class="profile-stat"><div class="ps-val">${formatFHShort(ac.totalRTE)}</div><div class="ps-lbl">Total RTE</div></div>
          <div class="profile-stat"><div class="ps-val">${acFlights.length}</div><div class="ps-lbl">Letu</div></div>
          <div class="profile-stat"><div class="ps-val" style="${redCount ? 'color:var(--danger)' : yellowCount ? 'color:#b45309' : 'color:var(--success)'}">${redCount + yellowCount}</div><div class="ps-lbl">Due Items</div></div>
          <div class="profile-stat"><div class="ps-val" style="${openAD ? 'color:var(--danger)' : ''}">${openAD}/${acADSB.length}</div><div class="ps-lbl">Open AD/SB</div></div>
        </div>
        <div style="margin-top:1rem;display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.85rem;color:var(--muted)">
          <span>Status: <strong style="color:var(--text)">${ac.status}</strong></span>
          <span>Kategorie: <strong style="color:var(--text)">${ac.category}</strong></span>
          <span>${propLabel}: <strong style="color:var(--text)">${propInfo ? propInfo.type + ' (S/N: ' + propInfo.sn + ')' : '—'}</strong></span>
          <span>Hydraulika: <strong style="color:var(--text)">${ac.hasHydraulic ? 'Ano' : 'Ne'}</strong></span>
          <span>Piloti: <strong style="color:var(--text)">${pilotNames.join(', ') || '—'}</strong></span>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Engine Cards (${acEngines.length})</div>
      <div class="engine-cards">${engineHtml || '<div class="empty-state">Zadne motory</div>'}</div>
    </div>

    ${hydHtml ? '<div class="profile-section"><div class="profile-section-title">Hydraulicky system</div>' + hydHtml + '</div>' : ''}

    <div class="profile-section">
      <div class="profile-section-title">Due List (${acDue.length} ukonu)</div>
      <div class="data-panel"><div class="table-scroll"><table>
        <thead><tr><th></th><th>Task</th><th>Ukon</th><th>Typ</th><th>Zbyva</th><th>Status</th></tr></thead>
        <tbody>${dueRows || '<tr><td colspan="6" class="empty-state">Zadne due items</td></tr>'}</tbody>
      </table></div></div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Task Cards (${acTasks.length})</div>
      <div class="data-panel"><div class="table-scroll"><table>
        <thead><tr><th>Task ID</th><th>Popis</th><th>Typ</th><th>Interval</th><th>Hodn.</th><th>Posl. FH</th><th>Posl. datum</th><th>Due FH</th><th>Due datum</th></tr></thead>
        <tbody>${taskRows || '<tr><td colspan="9" class="empty-state">Zadne task cards</td></tr>'}</tbody>
      </table></div></div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Komponenty (${acComps.length})</div>
      <div class="data-panel"><div class="table-scroll"><table>
        <thead><tr><th>Popis</th><th>P/N</th><th>S/N</th><th>Instalace</th><th>Limit FH</th><th>Limit Cal.</th><th>Remaining FH</th><th>Remaining Days</th></tr></thead>
        <tbody>${compRows || '<tr><td colspan="8" class="empty-state">Zadne komponenty</td></tr>'}</tbody>
      </table></div></div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">AD/SB Tracking (${acADSB.length})</div>
      <div class="data-panel"><div class="table-scroll"><table>
        <thead><tr><th>Cislo</th><th>Typ</th><th>Status</th><th>Popis</th><th>Zdroj</th><th>Termin</th><th>Splneno</th></tr></thead>
        <tbody>${adsbRows || '<tr><td colspan="7" class="empty-state">Zadne AD/SB</td></tr>'}</tbody>
      </table></div></div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Logbook — poslednich ${Math.min(acFlights.length, 10)} letu</div>
      <div class="data-panel"><div class="table-scroll"><table>
        <thead><tr><th>Datum</th><th>FH</th><th>FC</th><th>ES</th><th>RTE</th><th>Pilot</th><th>Total FH</th><th>Poznamka</th></tr></thead>
        <tbody>${flightRows || '<tr><td colspan="8" class="empty-state">Zadne lety</td></tr>'}</tbody>
      </table></div></div>
    </div>`;
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  recomputeAircraftTotals();
  recomputePilotTotals();
  refreshDueList();
  refreshComponents();
  renderDashboard();
  renderAircraftMaster();
  renderTaskCards();
  renderDueList();
  renderADSB();
  renderComponentControl();
  renderLogbook();
  renderPilots();
  renderEngineCards();
  renderReports();
  if (currentView === 'profile' && profileReg) {
    renderAircraftProfile(profileReg);
  }
}

// ============================================================
// INIT
// ============================================================
recomputeAircraftTotals();
recomputePilotTotals();
refreshDueList();
refreshComponents();
renderAll();
</script>
</body>
</html>
